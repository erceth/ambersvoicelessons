{{- if .Values.httpRoute.enabled }}
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: {{ .Values.httpRoute.name | default .Values.name }}
spec:
  parentRefs:
{{- range .Values.httpRoute.parentRefs }}
    - name: {{ .name }}
{{- if .namespace }}
      namespace: {{ .namespace }}
{{- end }}
{{- end }}
  hostnames:
{{- range .Values.httpRoute.hostnames }}
    - {{ . | quote }}
{{- end }}
  rules:
{{- range .Values.httpRoute.rules }}
    - matches:
{{- range .matches }}
        - path:
            type: {{ .path.type }}
            value: {{ .path.value | quote }}
{{- end }}
      backendRefs:
{{- range .backendRefs }}
        - name: {{ .name }}
          port: {{ .port }}
{{- end }}
{{- end }}
{{- end }}
