# Default values for ambersvoicelessons-chart.

replicaCount: 1

name: ambersvoicelessons

image:
  repository: erceth/ambersvoicelessons
  tag: v0.0.1

imagePullSecrets:
  name: regcred

resources:
  requests:
    memory: "64Mi"
    cpu: "250m"
  limits:
    memory: "128Mi"
    cpu: "500m"

service:
  port: 80
  protocol: TCP
  targetPort: 80

httpRoute:
  enabled: true
  name: ambersvoicelessons
  parentRefs:
    - name: shared-web
      namespace: ingress-system
  hostnames:
    - ambersvoicelessons.com
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /
      backendRefs:
        - name: ambersvoicelessons
          port: 80

